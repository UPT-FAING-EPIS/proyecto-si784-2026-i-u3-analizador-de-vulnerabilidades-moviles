name: Keep API Warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 70 \
            https://anzencore-api.yellowsand-01bb3852.eastus2.azurecontainerapps.io/api/v1/health) || STATUS="timeout"
          echo "Health status: $STATUS"
