name: Publish Docker Images to GitHub Packages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-images:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: |
          echo "REPO_API=${GITHUB_REPOSITORY,,}-api" >> $GITHUB_ENV
          echo "REPO_DASHBOARD=${GITHUB_REPOSITORY,,}-dashboard" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_API }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO_API }}:${{ github.sha }}

      - name: Build and push Dashboard Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_DASHBOARD }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO_DASHBOARD }}:${{ github.sha }}
