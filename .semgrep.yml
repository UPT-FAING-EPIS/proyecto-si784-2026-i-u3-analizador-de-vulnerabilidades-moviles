rules:
  - id: no-hardcoded-supabase-key
    message: No guardar claves de Supabase directamente en el codigo.
    severity: WARNING
    languages:
      - python
    pattern-regex: "sb_(anon|service_role|publishable)_[A-Za-z0-9_\\-]+"
  - id: no-hardcoded-password-variable
    message: Revisar posibles credenciales hardcodeadas.
    severity: WARNING
    languages:
      - python
    pattern-regex: "(?i)(password|secret|token)\\s*=\\s*['\"][^'\"]{8,}['\"]"
